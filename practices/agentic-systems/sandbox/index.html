<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Context Sandbox — Lab Bench</title>
<style>
  :root {
    --bg: #050506;
    --panel: #0a0a0c;
    --panel-2: #11131a;
    --panel-3: #161922;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text: #EDEDEF;
    --text-dim: #8A8F98;
    --text-muted: #5b6170;
    --accent: #5E6AD2;
    --accent-glow: rgba(94,106,210,0.25);
    --green: #9ece6a;
    --yellow: #e0af68;
    --red: #f7768e;
    --diff: rgba(94,106,210,0.18);
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Inter", "Helvetica Neue", sans-serif;
    font-size: 13px; line-height: 1.45;
    overflow: hidden;
  }
  /* ============ header ============ */
  header {
    display: flex; align-items: center; gap: 12px; padding: 8px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    height: 44px;
  }
  header .title { font-weight: 600; font-size: 13px; color: var(--text); letter-spacing: 0.01em; }
  header .crumb { color: var(--text-dim); font-size: 12px; }
  header .grow { flex: 1; }
  header a { color: var(--text-dim); text-decoration: none; font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 5px; }
  header a:hover { color: var(--text); border-color: var(--border-strong); }
  header a.active { background: var(--panel-2); color: var(--text); }
  header button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  header button:hover { border-color: var(--border-strong); }
  header button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  header button.primary:hover { background: #6e7adb; }
  /* ============ workbench ============ */
  main { display: flex; height: calc(100vh - 44px); }
  .bench { flex: 1; display: grid; grid-template-columns: repeat(var(--cols, 2), 1fr); gap: 1px; background: var(--border); overflow: hidden; }
  .column { background: var(--bg); display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .col-header { display: flex; align-items: center; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); }
  .col-label { font-weight: 600; font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .col-actions { margin-left: auto; display: flex; gap: 4px; }
  .col-actions button { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .col-actions button:hover { color: var(--text); border-color: var(--border-strong); }
  .col-body { flex: 1; overflow-y: auto; padding: 12px; }
  /* ============ cards ============ */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
  .card.diff { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
  .card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .card-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--panel-3); color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }
  .card-title { font-weight: 500; font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-meta { font-size: 10px; color: var(--text-muted); }
  .card-actions { display: flex; gap: 4px; margin-left: auto; }
  .card-actions button { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
  .card-actions button:hover { background: var(--panel-3); color: var(--text); }
  .card-body { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: pre-wrap; max-height: 160px; overflow-y: auto; padding: 6px; background: var(--panel-2); border-radius: 4px; border: 1px solid var(--border); }
  .card-body.editing { color: var(--text); background: var(--bg); }
  .card-edit-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }
  .card-edit-actions button { font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .card-edit-actions button.save { background: var(--accent); color: white; border: none; }
  .card-edit-actions button.cancel { background: var(--panel-2); color: var(--text-dim); border: 1px solid var(--border); }
  textarea.inline-editor { width: 100%; min-height: 200px; font-family: var(--mono); font-size: 11px; background: var(--bg); color: var(--text); border: 1px solid var(--accent); border-radius: 4px; padding: 8px; resize: vertical; }
  /* ============ slot dropdowns ============ */
  select.slot-pick { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 11px; font-family: inherit; max-width: 200px; }
  select.slot-pick:focus { outline: none; border-color: var(--accent); }
  /* ============ intent header ============ */
  .intent-block { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .intent-block.diff { border-color: var(--accent); }
  .intent-name { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 6px; }
  .intent-summary { font-size: 12px; color: var(--text-dim); }
  details.intent-detail { margin-top: 6px; }
  details.intent-detail summary { font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 2px 0; }
  details.intent-detail .meta { padding: 6px 0; font-size: 11px; }
  details.intent-detail ul { padding-left: 16px; margin: 4px 0; }
  details.intent-detail li { color: var(--text-dim); font-size: 11px; margin: 2px 0; }
  /* ============ run controls + output ============ */
  .run-strip { display: flex; gap: 8px; align-items: center; padding: 10px 0; }
  .run-strip button.run { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 12px; flex: 1; }
  .run-strip button.run:hover { background: #6e7adb; }
  .run-strip button.run:disabled { opacity: 0.4; cursor: not-allowed; }
  .run-strip .meta { font-size: 10px; color: var(--text-muted); margin-left: 8px; }
  .status-line { font-size: 11px; color: var(--text-dim); padding: 4px 0; min-height: 18px; }
  .status-line.error { color: var(--red); }
  .status-line.success { color: var(--green); }
  .output-block { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .output-text { font-family: var(--mono); font-size: 12px; color: var(--text); white-space: pre-wrap; max-height: 480px; overflow-y: auto; padding: 8px; background: var(--panel-2); border-radius: 4px; border: 1px solid var(--border); }
  .output-text.empty { color: var(--text-muted); font-style: italic; }
  /* ============ grade ============ */
  .grade-block { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .grade-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .grade-row label { width: 110px; font-size: 11px; color: var(--text-dim); }
  .grade-row input[type=number], .grade-row input[type=text] { flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; }
  .grade-row textarea { flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; font-size: 11px; min-height: 50px; font-family: inherit; resize: vertical; }
  .grade-stars { display: flex; gap: 2px; }
  .grade-star { font-size: 14px; cursor: pointer; color: var(--text-muted); }
  .grade-star.on { color: var(--yellow); }
  /* ============ modal ============ */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border-strong); border-radius: 8px; padding: 20px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .modal h2 { margin: 0 0 16px 0; font-size: 16px; }
  .modal .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
  .modal .row label { width: 140px; font-size: 12px; color: var(--text-dim); }
  .modal .row input, .modal .row select { flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 12px; }
  .modal .footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal .footer button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .modal .footer button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .modal .help { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  /* ============ history rail (collapsible) ============ */
  .history-rail { width: 0; background: var(--panel); border-left: 1px solid var(--border); overflow: hidden; transition: width 0.15s; }
  .history-rail.open { width: 280px; }
  .history-rail .inner { padding: 12px; overflow-y: auto; height: 100%; }
  .history-rail h3 { margin: 0 0 8px 0; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .history-item { padding: 8px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 6px; cursor: pointer; font-size: 11px; }
  .history-item:hover { border-color: var(--border-strong); }
  .history-item .row1 { display: flex; justify-content: space-between; }
  .history-item .row2 { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
  /* ============ pickers / utilities ============ */
  .empty { color: var(--text-muted); font-style: italic; padding: 12px; text-align: center; font-size: 12px; }
  kbd { background: var(--panel-3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; font-size: 10px; font-family: var(--mono); color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <span class="title">Context Sandbox</span>
  <span class="crumb">lab bench v1</span>
  <a href="index.html" class="active">Lab Bench</a>
  <a href="experts.html">Experts</a>
  <span class="grow"></span>
  <button id="btn-history">History</button>
  <button id="btn-inventory">Inventory</button>
  <button id="btn-settings">Settings</button>
  <button class="primary" id="btn-add-column">+ Column</button>
</header>

<main>
  <div class="bench" id="bench" style="--cols: 2;"></div>
  <aside class="history-rail" id="history-rail">
    <div class="inner">
      <h3>Run History</h3>
      <div id="history-list"></div>
    </div>
  </aside>
</main>

<!-- modals -->
<div class="modal-bg" id="modal-settings">
  <div class="modal">
    <h2>Settings</h2>
    <div class="row">
      <label>Anthropic API key</label>
      <input type="password" id="set-apikey" placeholder="sk-ant-...">
    </div>
    <div class="help" style="margin-left: 152px; margin-bottom: 12px;">Stored in browser localStorage only. Used to make direct API calls. Requires the <code>anthropic-dangerous-direct-browser-access</code> header (auto-applied).</div>
    <div class="row">
      <label>Model</label>
      <select id="set-model">
        <option value="claude-sonnet-4-6">Sonnet 4.6 (fast, balanced)</option>
        <option value="claude-opus-4-7">Opus 4.7 (highest quality)</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5 (cheapest)</option>
      </select>
    </div>
    <div class="row">
      <label>Max tokens</label>
      <input type="number" id="set-maxtokens" value="4096" min="256" max="64000">
    </div>
    <div class="footer">
      <button id="set-cancel">Cancel</button>
      <button class="primary" id="set-save">Save</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-inventory">
  <div class="modal" style="max-width: 900px;">
    <h2>Inventory</h2>
    <div style="display: flex; gap: 12px; margin-bottom: 12px;">
      <button id="inv-tab-intents" class="primary">Intents</button>
      <button id="inv-tab-contexts">Contexts</button>
      <button id="inv-tab-prompts">Prompts</button>
    </div>
    <div id="inv-list"></div>
    <div class="footer">
      <button id="inv-export">Export state JSON</button>
      <button id="inv-reset">Reset to seed</button>
      <button id="inv-close" class="primary">Close</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-edit">
  <div class="modal" style="max-width: 800px;">
    <h2 id="modal-edit-title">Edit</h2>
    <div id="modal-edit-body"></div>
    <div class="footer">
      <button id="modal-edit-cancel">Cancel</button>
      <button class="primary" id="modal-edit-save">Save (Forks New Version)</button>
    </div>
  </div>
</div>

<script>
// ============ state ============
const STORAGE_KEY = 'context-sandbox-v1';

function today() { return new Date().toISOString().slice(0,10); }
function uid(p) { return p + '_' + Math.random().toString(36).slice(2,9); }
function daysSince(iso) {
  const d = new Date(iso); const now = new Date();
  return Math.floor((now - d) / (1000*60*60*24));
}
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function seed() {
  return {
    intents: [{
      id: 'int_001',
      name: 'cold-outbound-sme-led-warm-reply',
      outcome: 'A Series A biotech CEO or founder, within 14 days of funding close, has engaged the SME in a real conversation about R&D capital efficiency. At least one reply opens the diagnostic loop (asks for the asset OR books diagnostic time).',
      success_criteria: [
        'positive_reply_rate >= 4% of sent volume',
        'reply asks for asset or books call (>=50% of positive replies)',
        'zero negative replies citing tone or spam'
      ],
      constraints: [
        'no phrases from sme.refused_phrasings',
        'no meeting-CTA language: calendar, 15 minutes, jump on a call, quick chat',
        'no claim about SME untraceable to on-record material',
        'email 1 <= 120 words; email 2+ <= 80 words; no exclamation marks'
      ],
      required_context_types: ['sme', 'offer', 'target'],
      routing: { operator: 'kepler', approval_loop: 'hermes', send_mechanic: 'linkedin_dm' }
    }],
    contexts: [
      {
        id: 'ctx_sme_001', type: 'sme', name: 'sme-placeholder', version: 1,
        parent_id: null, freshness_window_days: 180, updated_at: today(),
        body: '[PASTE RAW SME MATERIAL HERE]\n\n- Podcast / interview transcripts\n- LinkedIn posts (last 20)\n- Deal record: company, year, role, dollar figure, outcome\n- Refused phrasings (list)\n- Strong public opinions\n'
      },
      {
        id: 'ctx_offer_001', type: 'offer', name: 'offer-placeholder', version: 1,
        parent_id: null, freshness_window_days: 90, updated_at: today(),
        body: 'WHAT THE PROSPECT GETS\n- [specific deliverable]\n- [specific deliverable]\n\nWHY NOW\n- [trigger making this relevant this quarter]\n\nHANDOFF\n- SME does X\n- Operator delivers Y post-diagnostic\n\nEXAMPLE\n- [one real prior case with numbers]\n'
      },
      {
        id: 'ctx_target_001', type: 'target', name: 'target-placeholder', version: 1,
        parent_id: null, freshness_window_days: 14, updated_at: today(),
        body: "PERSONA\nTitle: [e.g. CEO / Founder]\nSegment: [e.g. Biotech / therapeutics]\nStage: [e.g. Series A, <=14 days post-close]\nSize: [headcount range]\n\nTRIGGER\n[recent event keying the outreach]\n\nHIDDEN COST\n[what they're absorbing right now that the offer addresses]\n"
      }
    ],
    prompts: [{
      id: 'pmt_001',
      name: 'cold-outbound-sme-led',
      version: 0,
      parent_id: null,
      body: "You are drafting cold outbound attributed to the SME named in the inputs.\n\nINPUTS (read each in full before writing):\n{{contexts}}\n\nINTENT\nOutcome: {{outcome}}\nSuccess criteria: {{success_criteria}}\n\nHARD RULES\n1. Every claim, opinion, or specific in the body traces to a line in one of the inputs. Tag each output line with its source.\n2. Unsourceable lines: mark [UNSOURCED] and flag.\n3. Banned phrases: revolutionary, disruptive, synergy, excited to reach out, hope this finds you, quick chat, jump on a call, 15 minutes, calendar.\n4. CTAs are interest questions, not meeting asks.\n5. Email 1 <= 120 words. Email 2+ <= 80.\n6. Prospect's reality appears before the SME's credentials.\n\nPHONE-READ TEST: every line should sound human, not marketing.\nFALSIFIABILITY: specifics should be checkable.\n\nOUTPUT FORMAT\n### Email N\nSubject: ...\nBody: ...\n[Source map: each line -> input section]\n\n## Flags\n- unsourced lines\n- thin spots in inputs you could not write around\n"
    }],
    runs: [],
    settings: { apiKey: '', model: 'claude-sonnet-4-6', maxTokens: 4096 },
    workbenches: null  // populated on init
  };
}

let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || seed();
if (!state.workbenches) {
  const intent = state.intents[0];
  state.workbenches = ['A', 'B'].map(label => initWorkbench(label, intent));
}

// Hydrate real Will + KAI substrate from on-disk manifest. Adds records that don't exist yet.
// Switches workbenches off placeholder defaults to real records.
async function hydrateSubstrate() {
  try {
    const res = await fetch('bench-substrate.json');
    if (!res.ok) return;
    const m = await res.json();
    let changed = false;
    (m.contexts_to_add || []).forEach(c => {
      if (!state.contexts.find(x => x.id === c.id)) {
        state.contexts.push(c);
        changed = true;
      }
    });
    // Flip workbenches off placeholder contexts to real ones if still on placeholders.
    const placeholderMap = { sme: 'ctx_sme_001', offer: 'ctx_offer_001', target: 'ctx_target_001' };
    const realMap = { sme: 'ctx_sme_will', offer: 'ctx_offer_kai_mdr', target: 'ctx_target_kai_mdr' };
    state.workbenches.forEach(wb => {
      Object.keys(placeholderMap).forEach(type => {
        if (wb.contextChoices[type] === placeholderMap[type] && state.contexts.find(c => c.id === realMap[type])) {
          wb.contextChoices[type] = realMap[type];
          changed = true;
        }
      });
    });
    if (changed) { save(); render(); }
  } catch (e) { console.warn('Substrate manifest not available:', e); }
}
function initWorkbench(label, intent) {
  const choices = {};
  intent.required_context_types.forEach(t => {
    const c = state.contexts.find(x => x.type === t);
    choices[t] = c ? c.id : '';
  });
  return {
    label,
    intentId: intent.id,
    contextChoices: choices,
    promptId: state.prompts[0] ? state.prompts[0].id : '',
    output: '',
    status: 'idle',
    statusMsg: '',
    grade: { quality: null, source_tag: null, what_worked: '', what_didnt: '' },
    lastRunId: null
  };
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ============ Claude API ============
async function callClaude(payload) {
  if (!state.settings.apiKey) throw new Error('No API key set. Open Settings.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': state.settings.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model: state.settings.model,
      max_tokens: state.settings.maxTokens,
      messages: [{ role: 'user', content: payload }]
    })
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error('API ' + res.status + ': ' + txt);
  }
  const data = await res.json();
  return {
    text: data.content.map(b => b.text || '').join(''),
    usage: data.usage,
    model: data.model
  };
}

function assemblePayload(wb) {
  const intent = state.intents.find(i => i.id === wb.intentId);
  const prompt = state.prompts.find(p => p.id === wb.promptId);
  if (!intent || !prompt) return null;
  const contexts = intent.required_context_types.map(t => state.contexts.find(c => c.id === wb.contextChoices[t]));
  if (contexts.some(c => !c)) return null;
  const contextSection = contexts.map(c => '## ' + c.type.toUpperCase() + ': ' + c.name + ' (v' + c.version + ')\n\n' + c.body).join('\n\n---\n\n');
  const body = prompt.body
    .replace('{{contexts}}', contextSection)
    .replace('{{outcome}}', intent.outcome)
    .replace('{{success_criteria}}', intent.success_criteria.join('; '));
  return '# INTENT: ' + intent.name + '\n\n' + body;
}

// ============ rendering ============
function render() {
  renderBench();
  renderHistoryRail();
}

function renderBench() {
  const bench = document.getElementById('bench');
  bench.style.setProperty('--cols', state.workbenches.length);
  bench.innerHTML = state.workbenches.map((wb, idx) => renderColumn(wb, idx)).join('');
  // wire events
  bench.querySelectorAll('[data-action]').forEach(el => {
    const wbIdx = parseInt(el.dataset.wb || '0');
    const wb = state.workbenches[wbIdx];
    const action = el.dataset.action;
    el.addEventListener('click', (e) => handleAction(action, wb, wbIdx, el, e));
    if (el.tagName === 'SELECT') el.addEventListener('change', () => handleAction(action, wb, wbIdx, el));
  });
}

function renderColumn(wb, idx) {
  const intent = state.intents.find(i => i.id === wb.intentId);
  const other = state.workbenches[idx === 0 ? 1 : 0];
  const isDifferentIntent = other && other.intentId !== wb.intentId;

  const intentOptions = state.intents.map(i => '<option value="' + esc(i.id) + '"' + (i.id === wb.intentId ? ' selected' : '') + '>' + esc(i.name) + '</option>').join('');

  let html = '<div class="column">';
  html += '<div class="col-header">';
  html += '<span class="col-label">Run ' + esc(wb.label) + '</span>';
  html += '<div class="col-actions">';
  html += '<button data-wb="' + idx + '" data-action="save-as-run">Save run</button>';
  html += '<button data-wb="' + idx + '" data-action="clone">Clone</button>';
  if (state.workbenches.length > 1) html += '<button data-wb="' + idx + '" data-action="remove">Remove</button>';
  html += '</div>';
  html += '</div>';
  html += '<div class="col-body">';

  // intent block
  html += '<div class="intent-block' + (isDifferentIntent ? ' diff' : '') + '">';
  html += '<select data-wb="' + idx + '" data-action="set-intent" class="slot-pick" style="max-width:100%;width:100%;margin-bottom:6px;">' + intentOptions + '</select>';
  if (intent) {
    html += '<div class="intent-summary">' + esc(intent.outcome) + '</div>';
    html += '<details class="intent-detail">';
    html += '<summary>Criteria + constraints</summary>';
    html += '<div class="meta"><strong>Success:</strong><ul>' + intent.success_criteria.map(c => '<li>' + esc(c) + '</li>').join('') + '</ul>';
    html += '<strong>Constraints:</strong><ul>' + intent.constraints.map(c => '<li>' + esc(c) + '</li>').join('') + '</ul></div>';
    html += '</details>';
  }
  html += '</div>';

  // context cards
  if (intent) {
    intent.required_context_types.forEach(type => {
      const chosen = state.contexts.find(c => c.id === wb.contextChoices[type]);
      const otherChoice = other && other.contextChoices ? other.contextChoices[type] : null;
      const differs = otherChoice && chosen && otherChoice !== chosen.id;
      const matches = state.contexts.filter(c => c.type === type);
      const opts = matches.map(c => '<option value="' + esc(c.id) + '"' + (chosen && c.id === chosen.id ? ' selected' : '') + '>' + esc(c.name) + ' v' + c.version + '</option>').join('');

      html += '<div class="card' + (differs ? ' diff' : '') + '">';
      html += '<div class="card-header">';
      html += '<span class="card-tag">' + esc(type) + '</span>';
      html += '<select data-wb="' + idx + '" data-action="swap-context" data-type="' + esc(type) + '" class="slot-pick">' + opts + '</select>';
      html += '<div class="card-actions">';
      if (chosen) html += '<button data-wb="' + idx + '" data-action="edit-context" data-type="' + esc(type) + '" title="Edit (forks)">edit</button>';
      html += '</div>';
      html += '</div>';
      if (chosen) {
        const age = daysSince(chosen.updated_at);
        const fresh = age <= chosen.freshness_window_days;
        html += '<div class="card-meta">v' + chosen.version + ' · ' + age + 'd old · ' + (fresh ? 'fresh' : 'STALE') + (chosen.parent_id ? ' · forked' : '') + '</div>';
        html += '<div class="card-body">' + esc(chosen.body) + '</div>';
      } else {
        html += '<div class="empty">No context picked</div>';
      }
      html += '</div>';
    });
  }

  // prompt card
  const prompt = state.prompts.find(p => p.id === wb.promptId);
  const otherPrompt = other ? other.promptId : null;
  const promptDiffers = otherPrompt && prompt && otherPrompt !== prompt.id;
  const pOpts = state.prompts.map(p => '<option value="' + esc(p.id) + '"' + (prompt && p.id === prompt.id ? ' selected' : '') + '>' + esc(p.name) + ' v' + p.version + '</option>').join('');
  html += '<div class="card' + (promptDiffers ? ' diff' : '') + '">';
  html += '<div class="card-header">';
  html += '<span class="card-tag">prompt</span>';
  html += '<select data-wb="' + idx + '" data-action="swap-prompt" class="slot-pick">' + pOpts + '</select>';
  html += '<div class="card-actions">';
  if (prompt) html += '<button data-wb="' + idx + '" data-action="edit-prompt" title="Edit (forks)">edit</button>';
  html += '</div>';
  html += '</div>';
  if (prompt) {
    html += '<div class="card-meta">v' + prompt.version + (prompt.parent_id ? ' · forked from ' + prompt.parent_id : '') + '</div>';
    html += '<div class="card-body">' + esc(prompt.body) + '</div>';
  }
  html += '</div>';

  // run strip
  html += '<div class="run-strip">';
  html += '<button class="run" data-wb="' + idx + '" data-action="run"' + (wb.status === 'running' ? ' disabled' : '') + '>' + (wb.status === 'running' ? 'Running...' : 'Run with Claude') + '</button>';
  html += '<span class="meta">' + esc(state.settings.model) + '</span>';
  html += '</div>';
  html += '<div class="status-line' + (wb.status === 'error' ? ' error' : wb.status === 'done' ? ' success' : '') + '">' + esc(wb.statusMsg || '') + '</div>';

  // output block
  html += '<div class="output-block">';
  html += '<div style="display:flex;align-items:center;margin-bottom:6px;"><span class="card-tag">output</span><div class="card-actions"><button data-wb="' + idx + '" data-action="copy-output">copy</button></div></div>';
  html += '<div class="output-text' + (!wb.output ? ' empty' : '') + '">' + (wb.output ? esc(wb.output) : '(run to generate)') + '</div>';
  html += '</div>';

  // grade
  html += '<div class="grade-block">';
  html += '<div style="display:flex;align-items:center;margin-bottom:8px;"><span class="card-tag">grade</span></div>';
  html += '<div class="grade-row"><label>Quality 1-5</label>';
  html += '<div class="grade-stars">';
  for (let s = 1; s <= 5; s++) html += '<span class="grade-star' + (wb.grade.quality >= s ? ' on' : '') + '" data-wb="' + idx + '" data-action="grade-quality" data-value="' + s + '">★</span>';
  html += '</div></div>';
  html += '<div class="grade-row"><label>Source-tag %</label><input type="number" min="0" max="100" data-wb="' + idx + '" data-action="grade-source" value="' + esc(wb.grade.source_tag || '') + '"></div>';
  html += '<div class="grade-row"><label>What worked</label><textarea data-wb="' + idx + '" data-action="grade-worked">' + esc(wb.grade.what_worked) + '</textarea></div>';
  html += '<div class="grade-row"><label>What didn\'t</label><textarea data-wb="' + idx + '" data-action="grade-didnt">' + esc(wb.grade.what_didnt) + '</textarea></div>';
  html += '</div>';

  html += '</div></div>';
  return html;
}

// ============ history rail ============
function renderHistoryRail() {
  const list = document.getElementById('history-list');
  if (state.runs.length === 0) { list.innerHTML = '<div class="empty">No runs yet</div>'; return; }
  list.innerHTML = state.runs.slice(0, 50).map(r => {
    const intent = state.intents.find(i => i.id === r.intent_id);
    const prompt = state.prompts.find(p => p.id === r.prompt_id);
    return '<div class="history-item" data-run="' + esc(r.id) + '"><div class="row1"><span>' + esc(intent ? intent.name : '?') + '</span><span>' + (r.grade && r.grade.quality ? '★'.repeat(r.grade.quality) : '') + '</span></div><div class="row2">' + esc(prompt ? prompt.name + ' v' + prompt.version : '?') + ' · ' + new Date(r.created_at).toLocaleTimeString() + '</div></div>';
  }).join('');
  list.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => loadRunIntoColumn(item.dataset.run, 0));
  });
}

function loadRunIntoColumn(runId, wbIdx) {
  const r = state.runs.find(x => x.id === runId);
  if (!r) return;
  const wb = state.workbenches[wbIdx];
  wb.intentId = r.intent_id;
  wb.promptId = r.prompt_id;
  const intent = state.intents.find(i => i.id === r.intent_id);
  if (intent) {
    wb.contextChoices = {};
    intent.required_context_types.forEach((t, i) => { wb.contextChoices[t] = r.context_ids[i] || ''; });
  }
  wb.output = r.output || '';
  wb.grade = r.grade || { quality: null, source_tag: null, what_worked: '', what_didnt: '' };
  wb.status = 'done';
  wb.statusMsg = 'Loaded from history';
  wb.lastRunId = r.id;
  save(); render();
}

// ============ actions ============
function handleAction(action, wb, wbIdx, el, evt) {
  if (action === 'set-intent') {
    wb.intentId = el.value;
    const intent = state.intents.find(i => i.id === wb.intentId);
    if (intent) {
      const newChoices = {};
      intent.required_context_types.forEach(t => {
        const existing = wb.contextChoices[t];
        const stillValid = existing && state.contexts.find(c => c.id === existing && c.type === t);
        newChoices[t] = stillValid ? existing : (state.contexts.find(c => c.type === t) || {}).id || '';
      });
      wb.contextChoices = newChoices;
    }
    save(); render();
  }
  else if (action === 'swap-context') {
    wb.contextChoices[el.dataset.type] = el.value;
    save(); render();
  }
  else if (action === 'swap-prompt') {
    wb.promptId = el.value;
    save(); render();
  }
  else if (action === 'edit-context') {
    const type = el.dataset.type;
    const c = state.contexts.find(x => x.id === wb.contextChoices[type]);
    if (c) openEditModal('context', c, (newBody) => {
      // fork
      const sameLineage = state.contexts.filter(x => x.parent_id === c.id || x.id === c.id || x.parent_id === c.parent_id);
      const maxV = Math.max(...state.contexts.filter(x => x.name === c.name || x.name.startsWith(c.name + '-fork')).map(x => x.version));
      const fork = { ...c, id: uid('ctx'), parent_id: c.id, version: maxV + 1, body: newBody, updated_at: today() };
      state.contexts.push(fork);
      wb.contextChoices[type] = fork.id;
      save(); render();
    });
  }
  else if (action === 'edit-prompt') {
    const p = state.prompts.find(x => x.id === wb.promptId);
    if (p) openEditModal('prompt', p, (newBody) => {
      const maxV = Math.max(...state.prompts.filter(x => x.name === p.name).map(x => x.version));
      const fork = { ...p, id: uid('pmt'), parent_id: p.id, version: maxV + 1, body: newBody };
      state.prompts.push(fork);
      wb.promptId = fork.id;
      save(); render();
    });
  }
  else if (action === 'run') {
    runColumn(wb, wbIdx);
  }
  else if (action === 'save-as-run') {
    saveAsRun(wb);
  }
  else if (action === 'clone') {
    cloneColumn(wbIdx);
  }
  else if (action === 'remove') {
    if (state.workbenches.length <= 1) return;
    state.workbenches.splice(wbIdx, 1);
    state.workbenches.forEach((w, i) => w.label = String.fromCharCode(65 + i));
    save(); render();
  }
  else if (action === 'copy-output') {
    if (wb.output) navigator.clipboard.writeText(wb.output);
  }
  else if (action === 'grade-quality') {
    wb.grade.quality = parseInt(el.dataset.value);
    if (wb.lastRunId) {
      const r = state.runs.find(x => x.id === wb.lastRunId);
      if (r) r.grade = { ...wb.grade };
    }
    save(); render();
  }
  else if (action === 'grade-source') {
    wb.grade.source_tag = parseFloat(el.value) || null;
    if (wb.lastRunId) { const r = state.runs.find(x => x.id === wb.lastRunId); if (r) r.grade = { ...wb.grade }; }
    save();
  }
  else if (action === 'grade-worked') {
    wb.grade.what_worked = el.value;
    if (wb.lastRunId) { const r = state.runs.find(x => x.id === wb.lastRunId); if (r) r.grade = { ...wb.grade }; }
    save();
  }
  else if (action === 'grade-didnt') {
    wb.grade.what_didnt = el.value;
    if (wb.lastRunId) { const r = state.runs.find(x => x.id === wb.lastRunId); if (r) r.grade = { ...wb.grade }; }
    save();
  }
}

async function runColumn(wb, wbIdx) {
  const payload = assemblePayload(wb);
  if (!payload) { wb.status = 'error'; wb.statusMsg = 'Missing intent, contexts, or prompt'; render(); return; }
  wb.status = 'running'; wb.statusMsg = 'Calling Claude...'; render();
  try {
    const result = await callClaude(payload);
    wb.output = result.text;
    wb.status = 'done';
    wb.statusMsg = 'Done · ' + result.usage.input_tokens + ' in / ' + result.usage.output_tokens + ' out tokens · ' + result.model;
    const run = {
      id: uid('run'),
      intent_id: wb.intentId,
      context_ids: state.intents.find(i => i.id === wb.intentId).required_context_types.map(t => wb.contextChoices[t]),
      prompt_id: wb.promptId,
      assembled: payload,
      output: result.text,
      usage: result.usage,
      model: result.model,
      grade: { ...wb.grade },
      status: 'completed',
      created_at: new Date().toISOString()
    };
    state.runs.unshift(run);
    wb.lastRunId = run.id;
    save(); render();
  } catch (err) {
    wb.status = 'error';
    wb.statusMsg = err.message;
    render();
  }
}

function saveAsRun(wb) {
  if (!wb.output) { alert('No output to save'); return; }
  // already saved if from run; for paste-in workflow we'd save here. Skip for now.
  alert('Auto-saved on each Claude call. Last run id: ' + (wb.lastRunId || 'none'));
}

function cloneColumn(srcIdx) {
  const src = state.workbenches[srcIdx];
  const clone = JSON.parse(JSON.stringify(src));
  clone.label = String.fromCharCode(65 + state.workbenches.length);
  clone.output = '';
  clone.status = 'idle';
  clone.statusMsg = '';
  clone.lastRunId = null;
  clone.grade = { quality: null, source_tag: null, what_worked: '', what_didnt: '' };
  state.workbenches.push(clone);
  save(); render();
}

// ============ edit modal ============
let currentEdit = null;
function openEditModal(kind, record, onSave) {
  currentEdit = { kind, record, onSave };
  document.getElementById('modal-edit-title').textContent = 'Edit ' + kind + ': ' + record.name + ' v' + record.version;
  document.getElementById('modal-edit-body').innerHTML = '<textarea class="inline-editor" id="edit-textarea" style="min-height:400px;">' + esc(record.body) + '</textarea>';
  document.getElementById('modal-edit').classList.add('show');
}
document.getElementById('modal-edit-cancel').onclick = () => {
  document.getElementById('modal-edit').classList.remove('show');
  currentEdit = null;
};
document.getElementById('modal-edit-save').onclick = () => {
  if (!currentEdit) return;
  const newBody = document.getElementById('edit-textarea').value;
  currentEdit.onSave(newBody);
  document.getElementById('modal-edit').classList.remove('show');
  currentEdit = null;
};

// ============ history rail toggle ============
document.getElementById('btn-history').onclick = () => {
  const r = document.getElementById('history-rail');
  r.classList.toggle('open');
  renderHistoryRail();
};

// ============ settings modal ============
document.getElementById('btn-settings').onclick = () => {
  document.getElementById('set-apikey').value = state.settings.apiKey || '';
  document.getElementById('set-model').value = state.settings.model;
  document.getElementById('set-maxtokens').value = state.settings.maxTokens;
  document.getElementById('modal-settings').classList.add('show');
};
document.getElementById('set-cancel').onclick = () => document.getElementById('modal-settings').classList.remove('show');
document.getElementById('set-save').onclick = () => {
  state.settings.apiKey = document.getElementById('set-apikey').value.trim();
  state.settings.model = document.getElementById('set-model').value;
  state.settings.maxTokens = parseInt(document.getElementById('set-maxtokens').value) || 4096;
  save();
  document.getElementById('modal-settings').classList.remove('show');
  render();
};

// ============ inventory modal ============
let invTab = 'intents';
document.getElementById('btn-inventory').onclick = () => { invTab = 'intents'; renderInventory(); document.getElementById('modal-inventory').classList.add('show'); };
document.getElementById('inv-close').onclick = () => document.getElementById('modal-inventory').classList.remove('show');
document.getElementById('inv-tab-intents').onclick = () => { invTab = 'intents'; renderInventory(); };
document.getElementById('inv-tab-contexts').onclick = () => { invTab = 'contexts'; renderInventory(); };
document.getElementById('inv-tab-prompts').onclick = () => { invTab = 'prompts'; renderInventory(); };
document.getElementById('inv-export').onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sandbox-state-' + today() + '.json';
  a.click();
};
document.getElementById('inv-reset').onclick = () => {
  if (!confirm('Reset all sandbox state to seed? This wipes runs, edits, and forks.')) return;
  state = seed();
  const intent = state.intents[0];
  state.workbenches = ['A', 'B'].map(label => initWorkbench(label, intent));
  save(); render();
};

function renderInventory() {
  ['intents','contexts','prompts'].forEach(t => {
    document.getElementById('inv-tab-' + t).className = (t === invTab) ? 'primary' : '';
  });
  const list = document.getElementById('inv-list');
  if (invTab === 'intents') {
    list.innerHTML = state.intents.map(i => '<div class="card"><div class="card-header"><strong>' + esc(i.name) + '</strong><span class="card-meta">requires: ' + esc(i.required_context_types.join(', ')) + '</span></div><div class="card-body">' + esc(i.outcome) + '</div></div>').join('');
  } else if (invTab === 'contexts') {
    list.innerHTML = state.contexts.map(c => {
      const age = daysSince(c.updated_at);
      return '<div class="card"><div class="card-header"><span class="card-tag">' + esc(c.type) + '</span><strong>' + esc(c.name) + '</strong><span class="card-meta">v' + c.version + ' · ' + age + 'd · ' + (c.parent_id ? 'forked' : 'root') + '</span></div><div class="card-body">' + esc(c.body.slice(0, 400)) + (c.body.length > 400 ? '\n...' : '') + '</div></div>';
    }).join('');
  } else {
    list.innerHTML = state.prompts.map(p => '<div class="card"><div class="card-header"><strong>' + esc(p.name) + '</strong><span class="card-meta">v' + p.version + (p.parent_id ? ' · forked' : '') + '</span></div><div class="card-body">' + esc(p.body.slice(0, 400)) + (p.body.length > 400 ? '\n...' : '') + '</div></div>').join('');
  }
}

// ============ add column ============
document.getElementById('btn-add-column').onclick = () => {
  if (state.workbenches.length >= 4) { alert('Max 4 columns'); return; }
  const last = state.workbenches[state.workbenches.length - 1];
  const clone = JSON.parse(JSON.stringify(last));
  clone.label = String.fromCharCode(65 + state.workbenches.length);
  clone.output = '';
  clone.status = 'idle';
  clone.statusMsg = '';
  clone.lastRunId = null;
  clone.grade = { quality: null, source_tag: null, what_worked: '', what_didnt: '' };
  state.workbenches.push(clone);
  save(); render();
};

// ============ init ============
render();
hydrateSubstrate();
</script>
